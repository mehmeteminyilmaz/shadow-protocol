  <polygon points="16,2 28,9 28,23 16,30 4,23 4,9" fill="none" stroke="#00f0ff" stroke-width="1.5" opacity="0.9"/>
  <!-- Inner S glyph -->
  <text x="50%" y="21" text-anchor="middle" font-family="monospace" font-weight="bold" font-size="15" fill="#00f0ff" opacity="0.95">S</text>
  <!-- Corner dots -->
  <circle cx="16" cy="2" r="1.5" fill="#00f0ff"/>
  <circle cx="28" cy="9" r="1.5" fill="#00f0ff"/>
  <circle cx="28" cy="23" r="1.5" fill="#00f0ff"/>
  <circle cx="16" cy="30" r="1.5" fill="#00f0ff"/>
  <circle cx="4" cy="23" r="1.5" fill="#00f0ff"/>
  <circle cx="4" cy="9" r="1.5" fill="#00f0ff"/>
